<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo de Libros - U-Books</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
  <!-- Estilos personalizados -->
  <link href="CSS/loginStyles.css" rel="stylesheet" />
</head>

<body>

  <!-- ── Navbar ── -->
  <nav class="navbar-ubooks d-flex align-items-center gap-1">
    <div class="logo-shield">
      <img src="IMG/logo.png" alt="Logo U-Books"/>
    </div>
    <div>
      <div class="brand-title">U-Books</div>
      <div class="brand-sub">Libros Académicos UCLA</div>
    </div>
  </nav>

  <!-- ── Contenido ── -->
  <main>
    <div class="login-card">

      <!-- Panel izquierdo -->
      <div class="login-left">
        <div class="left-content">

          <div class="left-logo-badge">
            
            <div class="shield-sm"><img src="IMG/logo.png" alt="Logo U-Books"/></div>
            
            <div class="brand-text-sm">
              <div class="t1">U-Books</div>
              <div class="t2">Libros Académicos UCLA</div>
            </div>
          </div>

          <div class="login-tagline">
            <p>Conecta.<br>Intercambia.<br>Aprende.</p>
          </div>

        </div>
      </div>

      <!-- Panel derecho -->
      <div class="login-right">
        <h2>Te damos la Bienvenida</h2>
        <p class="subtitle">Inicia sesión para continuar</p>

        <form id="loginForm">

        <div class="mb3">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" id="email" name="email" class="form-control" 
                  placeholder="ejemplo.ucla@gmail.com" required/>
        </div>

        <div class="mb2">
          <label for="password" class="form-label">Contraseña</label>
          <div class="input-group">
            <input type="password" id="password" name="password" class="form-control" 
                    placeholder="Ingrese su contraseña" minlength="6" required/>
            <button class="btn-eye" type="button" onclick="togglePass('password','iconId')" title="Mostrar/ocultar contraseña">
              <i class="eye-icon bi bi-eye-slash" id="iconId"></i>
            </button>
          </div>
        </div>

        <div id="loginError" style="display: none; color: #dc2626; font-size:0.88rem; margin-bottom: 0.75rem;"></div>

        <button type="submit" class="btn-login full">Iniciar Sesión</button>

        </form>

        <div class="or-divider">o</div>

        <p class="register-link">
          ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
        </p>
      </div>

    </div>
  </main>

  <!-- ── Footer ── -->
  <footer>
    U-Books © 2026 &bull; Plataforma independiente de la UCLA
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="JS/autenticacion.js"></script>

</body>
</html>
